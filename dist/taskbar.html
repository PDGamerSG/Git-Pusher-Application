<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Git Pusher — Taskbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: #fff;
      overflow: visible;
      user-select: none;
      width: 100%;
      height: 80%;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    body.dir-down {
      justify-content: flex-start;
    }

    .bar {
      display: flex;
      align-items: center;
      height: 35px;
      min-height: 30px;
      padding: 0 5px;
      gap: 6px;
      background: transparent;
      /* border: 1px solid #2a2a2a; */
      position: relative;
      flex-shrink: 0;
    }

    /* Drag handle */
    .drag-handle {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      cursor: grab;
      padding: 3px 2px;
      position: relative;
      top: 3px;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle svg { opacity: 0.3; flex-shrink: 0; }

    .logo { width: 14px; height: 14px; flex-shrink: 0; }

    /* Project selector */
    .project-btn {
      background: #1a1a1a;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      border: 1px solid #333;
      color: #ffffff;
      font-size: 11px;
      font-weight: 400;
      height: 22px;
      line-height: 22px;
      padding: 0 7px;
      cursor: pointer;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s;
      position: relative;
      top: 4px;
      left: 1px;
    }
    .project-btn:hover { border-color: #ffffff; }

    /* Dropdown */
    .dropdown {
      display: none;
      position: absolute;
      left: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      min-width: 160px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 100;
      padding: 3px;
    }
    .dropdown.open { display: block; }

    body:not(.dir-down) .dropdown {
      bottom: 37px;
      top: auto;
    }
    body.dir-down .dropdown {
      top: 37px;
      bottom: auto;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      padding: 5px 8px;
      color: #ffffff;
      font-size: 10px;
      color: #ccc;
      cursor: pointer;
    }
    .dropdown-item:hover { background: #252525; color: #fff; }
    .dropdown-item.active { color: #10b981; }
    .dropdown-item .check { width: 10px; font-size: 9px; flex-shrink: 0; }

    /* Feature input */
    .input-wrap { flex: 1; min-width: 0; }
    .feature-input {
      width: 100%;
      background: #0a0a0a;
      height: 22px;
      border: 1px solid #333;
      color: #fff;
      font-size: 10px;
      font-weight: 300;
      padding: 0 7px;
      line-height: 20px;
      outline: none;
      transition: border-color 0.2s;
      position: relative;
      top: 2.5px;
    }
    .feature-input::placeholder { color: #555; }
    .feature-input:focus { border-color: #ffffff; }
    .feature-input.success { border-color: #10b981; }
    .feature-input.error { border-color: #ef4444; color: #fca5a5; }
    .feature-input:disabled { opacity: 0.4; }

    /* Status dot */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
      transition: background 0.2s;
      position: relative;
      top: 3px;
    }
    .status-dot.idle { background: #555; }
    .status-dot.pushing { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.success { background: #10b981; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="bar">
    <!-- Drag handle -->
    <div class="drag-handle">
      <svg width="6" height="14" viewBox="0 0 6 14" fill="currentColor">
        <circle cx="1.5" cy="1.5" r="1.1"/><circle cx="4.5" cy="1.5" r="1.1"/>
        <circle cx="1.5" cy="5" r="1.1"/><circle cx="4.5" cy="5" r="1.1"/>
        <circle cx="1.5" cy="8.5" r="1.1"/><circle cx="4.5" cy="8.5" r="1.1"/>
        <circle cx="1.5" cy="12" r="1.1"/><circle cx="4.5" cy="12" r="1.1"/>
      <!-- </svg>
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke-linecap="round"/>
      </svg> -->
    </div>

    <!-- Project selector + dropdown -->
    <button class="project-btn" id="projectBtn">No project</button>
    <div class="dropdown" id="dropdown"></div>

    <!-- Feature input -->
    <div class="input-wrap">
      <input
        type="text"
        class="feature-input"
        id="featureInput"
        placeholder="Feature pls:)"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Status -->
    <div class="status-dot idle" id="statusDot"></div>
  </div>

  <script>
    const projectBtn   = document.getElementById('projectBtn');
    const dropdown     = document.getElementById('dropdown');
    const featureInput = document.getElementById('featureInput');
    const statusDot    = document.getElementById('statusDot');

    const WINDOW_HEIGHT = 238;
    const BAR_HEIGHT    = 38;

    let state          = { projects: [], activeProjectId: '', grokApiKey: '' };
    let isPushing      = false;
    let feedbackTimeout = null;
    let dropdownOpen   = false;
    let direction      = localStorage.getItem('taskbar-direction') || 'up';

    // ── Direction (controlled from main app via IPC) ─────────────────────────
    function applyDirection() {
      if (direction === 'down') {
        document.body.classList.add('dir-down');
      } else {
        document.body.classList.remove('dir-down');
      }
    }
    applyDirection();

    // ── Click-through for transparent area ───────────────────────────────────
    const dragHandle = document.querySelector('.drag-handle');
    let isDragging = false;

    dragHandle.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      isDragging = true;
      window.taskbarAPI.setIgnoreMouseEvents(false);
      window.taskbarAPI.dragStart({ screenX: e.screenX, screenY: e.screenY });
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        window.taskbarAPI.dragMove({ screenX: e.screenX, screenY: e.screenY });
        return;
      }
      if (dropdownOpen) {
        window.taskbarAPI.setIgnoreMouseEvents(false);
        return;
      }
      const overBar = direction === 'up'
        ? e.clientY >= WINDOW_HEIGHT - BAR_HEIGHT
        : e.clientY <= BAR_HEIGHT;
      window.taskbarAPI.setIgnoreMouseEvents(!overBar, { forward: true });
    });

    document.addEventListener('mouseup', (e) => {
      if (isDragging && e.button === 0) {
        isDragging = false;
        window.taskbarAPI.dragEnd();
      }
    });

    document.addEventListener('mouseleave', () => {
      if (!isDragging && !dropdownOpen) {
        window.taskbarAPI.setIgnoreMouseEvents(true, { forward: true });
      }
    });

    // ── Dropdown ─────────────────────────────────────────────────────────────
    function renderDropdown() {
      dropdown.innerHTML = '';
      if (state.projects.length === 0) {
        dropdown.innerHTML = '<div class="dropdown-item" style="color:#666;cursor:default">No projects</div>';
        return;
      }
      state.projects.forEach(p => {
        const item = document.createElement('div');
        item.className = 'dropdown-item' + (p.id === state.activeProjectId ? ' active' : '');
        item.innerHTML = '<span class="check">' + (p.id === state.activeProjectId ? '✓' : '') + '</span>' + escapeHtml(p.name);
        item.addEventListener('click', async (e) => {
          e.stopPropagation();
          state.activeProjectId = p.id;
          updateProjectBtn();
          await window.taskbarAPI.setActiveProject(p.id);
          closeDropdown();
        });
        dropdown.appendChild(item);
      });
    }

    function openDropdown() {
      if (dropdownOpen) return;
      renderDropdown();
      dropdownOpen = true;
      dropdown.classList.add('open');
      window.taskbarAPI.setIgnoreMouseEvents(false);
    }

    function closeDropdown() {
      if (!dropdownOpen) return;
      dropdownOpen = false;
      dropdown.classList.remove('open');
    }

    projectBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dropdownOpen) closeDropdown(); else openDropdown();
    });

    document.addEventListener('click', () => closeDropdown());
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    // ── Helpers ───────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function setStatus(s) { statusDot.className = 'status-dot ' + s; }

    function updateProjectBtn() {
      const active = state.projects.find(p => p.id === state.activeProjectId);
      projectBtn.textContent = active ? active.name : 'No project';
    }

    // ── Push ─────────────────────────────────────────────────────────────────
    featureInput.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();

      const feature = featureInput.value.trim();
      if (!feature || isPushing) return;

      const active = state.projects.find(p => p.id === state.activeProjectId);
      if (!active) { flashError('select a project first'); return; }

      isPushing = true;
      featureInput.disabled = true;
      setStatus('pushing');

      try {
        const result = await window.taskbarAPI.push({
          repoPath: active.path,
          featureName: feature,
          apiKey: state.grokApiKey
        });

        if (result.success) {
          featureInput.value = '';
          flashSuccess();
        } else {
          flashError(result.error || 'push failed');
        }
      } catch (err) {
        flashError(err.message || 'push failed');
      } finally {
        isPushing = false;
        featureInput.disabled = false;
        featureInput.focus();
      }
    });

    function flashSuccess() {
      setStatus('success');
      featureInput.className = 'feature-input success';
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        featureInput.className = 'feature-input';
        setStatus('idle');
      }, 1500);
    }

    function flashError(msg) {
      setStatus('error');
      featureInput.className = 'feature-input error';
      featureInput.value = msg.length > 40 ? msg.slice(0, 37) + '...' : msg;
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        featureInput.value = '';
        featureInput.className = 'feature-input';
        setStatus('idle');
      }, 1500);
    }

    // ── State ─────────────────────────────────────────────────────────────────
    (async () => {
      try {
        state = await window.taskbarAPI.getState();
        updateProjectBtn();
      } catch (e) {
        console.error('Failed to load state:', e);
      }
    })();

    window.taskbarAPI.onStateUpdate((data) => {
      state = data;
      updateProjectBtn();
    });

    // Listen for direction changes from main app
    window.taskbarAPI.onDirectionChanged((dir) => {
      direction = dir;
      localStorage.setItem('taskbar-direction', dir);
      applyDirection();
    });
  </script>
</body>
</html>
