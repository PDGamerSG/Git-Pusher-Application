<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Git Pusher — Taskbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
      user-select: none;
      width: 100%;
      height: 100%;
    }

    /* Direction: up = bar at bottom, down = bar at top */
    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    body.dir-down {
      justify-content: flex-start;
    }

    .bar {
      display: flex;
      align-items: center;
      height: 48px;
      min-height: 48px;
      padding: 0 10px;
      gap: 8px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      position: relative;
      flex-shrink: 0;
    }

    /* Drag handle */
    .drag-handle {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: grab;
      padding: 4px 2px;
    }
    .drag-handle svg { opacity: 0.3; flex-shrink: 0; }

    .logo { width: 16px; height: 16px; flex-shrink: 0; }

    /* Project selector */
    .project-btn {
      -webkit-app-region: no-drag;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #10b981;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      cursor: pointer;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .project-btn:hover { border-color: #10b981; }

    /* Dropdown: hidden by default, shown with .open */
    .dropdown {
      display: none;
      position: absolute;
      left: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      min-width: 180px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      padding: 4px;
    }
    .dropdown.open { display: block; }

    /* Upward (default): dropdown above bar */
    body:not(.dir-down) .dropdown {
      bottom: 50px;
      top: auto;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
    }
    /* Downward: dropdown below bar */
    body.dir-down .dropdown {
      top: 50px;
      bottom: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #ccc;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .dropdown-item:hover { background: #252525; color: #fff; }
    .dropdown-item.active { color: #10b981; }
    .dropdown-item .check { width: 12px; font-size: 10px; flex-shrink: 0; }

    /* Feature input */
    .input-wrap { flex: 1; min-width: 0; }
    .feature-input {
      -webkit-app-region: no-drag;
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .feature-input::placeholder { color: #555; }
    .feature-input:focus { border-color: #10b981; }
    .feature-input.success { border-color: #10b981; }
    .feature-input.error { border-color: #ef4444; color: #fca5a5; }
    .feature-input:disabled { opacity: 0.4; }

    /* Status dot */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
      transition: background 0.2s;
    }
    .status-dot.idle { background: #555; }
    .status-dot.pushing { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.success { background: #10b981; }
    .status-dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Direction toggle */
    .direction-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #444;
      font-size: 11px;
      cursor: pointer;
      padding: 2px 3px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 3px;
    }
    .direction-btn:hover { color: #10b981; background: #1a1a1a; }

    /* Close button */
    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #555;
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      border-radius: 4px;
    }
    .close-btn:hover { color: #ef4444; background: #1a1a1a; }
  </style>
</head>
<body>
  <div class="bar">
    <!-- Drag handle -->
    <div class="drag-handle">
      <svg width="6" height="16" viewBox="0 0 6 16" fill="currentColor">
        <circle cx="1.5" cy="2" r="1.2"/><circle cx="4.5" cy="2" r="1.2"/>
        <circle cx="1.5" cy="6" r="1.2"/><circle cx="4.5" cy="6" r="1.2"/>
        <circle cx="1.5" cy="10" r="1.2"/><circle cx="4.5" cy="10" r="1.2"/>
        <circle cx="1.5" cy="14" r="1.2"/><circle cx="4.5" cy="14" r="1.2"/>
      </svg>
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 3v3M12 18v3M3 12h3M18 12h3" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Project selector + dropdown -->
    <button class="project-btn" id="projectBtn">No project</button>
    <div class="dropdown" id="dropdown"></div>

    <!-- Feature input -->
    <div class="input-wrap">
      <input
        type="text"
        class="feature-input"
        id="featureInput"
        placeholder="type feature and press Enter..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Status -->
    <div class="status-dot idle" id="statusDot"></div>

    <!-- Direction toggle -->
    <button class="direction-btn" id="directionBtn" title="Toggle dropdown direction">▲</button>

    <!-- Close -->
    <button class="close-btn" id="closeBtn" title="Close">&times;</button>
  </div>

  <script>
    const projectBtn  = document.getElementById('projectBtn');
    const dropdown    = document.getElementById('dropdown');
    const featureInput = document.getElementById('featureInput');
    const statusDot   = document.getElementById('statusDot');
    const closeBtn    = document.getElementById('closeBtn');
    const directionBtn = document.getElementById('directionBtn');

    const WINDOW_HEIGHT = 264;
    const BAR_HEIGHT    = 48;

    let state          = { projects: [], activeProjectId: '', grokApiKey: '' };
    let isPushing      = false;
    let feedbackTimeout = null;
    let dropdownOpen   = false;
    let direction      = localStorage.getItem('taskbar-direction') || 'up';

    // ── Direction ────────────────────────────────────────────────────────────
    function applyDirection() {
      if (direction === 'down') {
        document.body.classList.add('dir-down');
        directionBtn.textContent = '▼';
        directionBtn.title = 'Dropdown opens below — click to open above';
      } else {
        document.body.classList.remove('dir-down');
        directionBtn.textContent = '▲';
        directionBtn.title = 'Dropdown opens above — click to open below';
      }
    }
    applyDirection();

    directionBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeDropdown();
      direction = direction === 'up' ? 'down' : 'up';
      localStorage.setItem('taskbar-direction', direction);
      applyDirection();
    });

    // ── Click-through for transparent area ───────────────────────────────────
    // The window is always 264px; only the 48px bar and open dropdown are interactive.
    // Everything else is transparent and should pass mouse events to the OS.
    function updateMouseEvents() {
      if (dropdownOpen) {
        window.taskbarAPI.setIgnoreMouseEvents(false);
        return;
      }
      // We can't use e.clientY here so this is called from mousemove
    }

    document.addEventListener('mousemove', (e) => {
      if (dropdownOpen) {
        window.taskbarAPI.setIgnoreMouseEvents(false);
        return;
      }
      const overBar = direction === 'up'
        ? e.clientY >= WINDOW_HEIGHT - BAR_HEIGHT
        : e.clientY <= BAR_HEIGHT;
      window.taskbarAPI.setIgnoreMouseEvents(!overBar, { forward: true });
    });

    document.addEventListener('mouseleave', () => {
      if (!dropdownOpen) {
        window.taskbarAPI.setIgnoreMouseEvents(true, { forward: true });
      }
    });

    // ── Dropdown ─────────────────────────────────────────────────────────────
    function renderDropdown() {
      dropdown.innerHTML = '';
      if (state.projects.length === 0) {
        dropdown.innerHTML = '<div class="dropdown-item" style="color:#666;cursor:default">No projects</div>';
        return;
      }
      state.projects.forEach(p => {
        const item = document.createElement('div');
        item.className = 'dropdown-item' + (p.id === state.activeProjectId ? ' active' : '');
        item.innerHTML = '<span class="check">' + (p.id === state.activeProjectId ? '✓' : '') + '</span>' + escapeHtml(p.name);
        item.addEventListener('click', async (e) => {
          e.stopPropagation();
          state.activeProjectId = p.id;
          updateProjectBtn();
          await window.taskbarAPI.setActiveProject(p.id);
          closeDropdown();
        });
        dropdown.appendChild(item);
      });
    }

    function openDropdown() {
      if (dropdownOpen) return;
      renderDropdown();
      dropdownOpen = true;
      dropdown.classList.add('open');
      window.taskbarAPI.setIgnoreMouseEvents(false);
    }

    function closeDropdown() {
      if (!dropdownOpen) return;
      dropdownOpen = false;
      dropdown.classList.remove('open');
    }

    projectBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dropdownOpen) closeDropdown(); else openDropdown();
    });

    document.addEventListener('click', () => closeDropdown());
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    // ── Helpers ───────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function setStatus(s) { statusDot.className = 'status-dot ' + s; }

    function updateProjectBtn() {
      const active = state.projects.find(p => p.id === state.activeProjectId);
      projectBtn.textContent = active ? active.name : 'No project';
    }

    // ── Push ─────────────────────────────────────────────────────────────────
    featureInput.addEventListener('keydown', async (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();

      const feature = featureInput.value.trim();
      if (!feature || isPushing) return;

      const active = state.projects.find(p => p.id === state.activeProjectId);
      if (!active) { flashError('select a project first'); return; }

      isPushing = true;
      featureInput.disabled = true;
      setStatus('pushing');

      try {
        const result = await window.taskbarAPI.push({
          repoPath: active.path,
          featureName: feature,
          apiKey: state.grokApiKey
        });

        if (result.success) {
          featureInput.value = '';
          flashSuccess();
        } else {
          flashError(result.error || 'push failed');
        }
      } catch (err) {
        flashError(err.message || 'push failed');
      } finally {
        isPushing = false;
        featureInput.disabled = false;
        featureInput.focus();
      }
    });

    function flashSuccess() {
      setStatus('success');
      featureInput.className = 'feature-input success';
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        featureInput.className = 'feature-input';
        setStatus('idle');
      }, 1500);
    }

    function flashError(msg) {
      setStatus('error');
      featureInput.className = 'feature-input error';
      featureInput.value = msg.length > 40 ? msg.slice(0, 37) + '...' : msg;
      clearTimeout(feedbackTimeout);
      feedbackTimeout = setTimeout(() => {
        featureInput.value = '';
        featureInput.className = 'feature-input';
        setStatus('idle');
      }, 1500);
    }

    closeBtn.addEventListener('click', () => window.taskbarAPI.close());

    // ── State ─────────────────────────────────────────────────────────────────
    (async () => {
      try {
        state = await window.taskbarAPI.getState();
        updateProjectBtn();
      } catch (e) {
        console.error('Failed to load state:', e);
      }
    })();

    window.taskbarAPI.onStateUpdate((data) => {
      state = data;
      updateProjectBtn();
    });
  </script>
</body>
</html>
